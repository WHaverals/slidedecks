<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=JetBrains+Mono:wght@400&display=swap"
		/>
		<script src="../../../plugins/d3/d3.min.js"></script>
		<style>
			html,
			body { margin: 0; background: transparent; overflow: hidden; }
			svg { display: block; }
			text { font-family: "JetBrains Mono", ui-monospace, monospace; }
		</style>
	</head>
	<body>
		<script src="cohort-slopes-data.js"></script>
		<script>
			const COL = { declining: "#4662ac", rising: "#f05c6a" };
			const data = window.PPA_COHORTS;
			const periods = data.periods; // ascending mean (index 0 = most declining)
			const grid = data.grid;

			const W = 1000, H = 560;
			const m = { l: 250, r: 30, t: 70, b: 56 };
			const x = d3.scaleLinear().domain(data.x_domain).range([m.l, W - m.r]);
			const plotTop = m.t, plotBot = H - m.b;
			const rowStep = (plotBot - plotTop) / periods.length;
			const baselineY = (rank) => plotBot - rank * rowStep - rowStep * 0.35;
			// height-normalise each ridge to its own peak so broad and concentrated
			// cohorts are equally legible; position vs 0 is what carries the story.
			const peak = periods.map((p) => Math.max(...p.density));
			const scaleFor = (rank) => (rowStep * 1.45) / peak[rank];

			const svg = d3
				.select("body").append("svg")
				.attr("viewBox", `0 0 ${W} ${H}`).attr("preserveAspectRatio", "xMidYMid meet");
			function fitToFrame() {
				const el = window.frameElement;
				svg.attr("width", el ? el.clientWidth : W).attr("height", el ? el.clientHeight : H);
			}
			fitToFrame();
			window.addEventListener("resize", fitToFrame);

			// per-cohort vertical fade: saturated at the baseline → translucent at the crest
			const defs = svg.append("defs");
			[["declining", COL.declining], ["rising", COL.rising]].forEach(([id, c]) => {
				const g = defs.append("linearGradient").attr("id", "vgrad-" + id)
					.attr("x1", 0).attr("y1", 0).attr("x2", 0).attr("y2", 1);
				g.append("stop").attr("offset", "0%").attr("stop-color", c).attr("stop-opacity", 0.1);
				g.append("stop").attr("offset", "100%").attr("stop-color", c).attr("stop-opacity", 0.62);
			});

			// --- static frame: x grid, zero rule, axis ---
			const gx = svg.append("g");
			[-0.3, -0.2, -0.1, 0.1, 0.2, 0.3].forEach((t) => {
				gx.append("line").attr("x1", x(t)).attr("x2", x(t)).attr("y1", plotTop).attr("y2", plotBot)
					.attr("stroke", "#ece7df").attr("stroke-width", 1);
				gx.append("text").attr("x", x(t)).attr("y", plotBot + 22).attr("text-anchor", "middle")
					.attr("fill", "#a8a29e").attr("font-size", 14).text(t.toFixed(1));
			});
			// zero rule
			svg.append("line").attr("x1", x(0)).attr("x2", x(0)).attr("y1", plotTop - 4).attr("y2", plotBot)
				.attr("stroke", "#bdb6a9").attr("stroke-width", 1.3).attr("stroke-dasharray", "5 5");
			gx.append("text").attr("x", x(0)).attr("y", plotBot + 22).attr("text-anchor", "middle")
				.attr("fill", "#78716c").attr("font-size", 14).text("0");
			// axis annotations
			svg.append("text").attr("x", x(-0.16)).attr("y", H - 12).attr("text-anchor", "middle")
				.attr("fill", COL.declining).attr("font-size", 14).attr("letter-spacing", "0.05em").text("← DECLINING");
			svg.append("text").attr("x", x(0.16)).attr("y", H - 12).attr("text-anchor", "middle")
				.attr("fill", COL.rising).attr("font-size", 14).attr("letter-spacing", "0.05em").text("RISING →");

			// --- ridges (one per period) ---
			const area = (rank, t) =>
				d3.area()
					.x((d, i) => x(grid[i]))
					.y0(baselineY(rank))
					.y1((d, i) => baselineY(rank) - d * scaleFor(rank) * t)
					.curve(d3.curveBasis)(periods[rank].density);

			const ridgeG = periods.map((p, rank) => {
				const g = svg.append("g").attr("opacity", 0);
				const col = COL[p.color];
				const path = g.append("path").attr("d", area(rank, 0)).attr("fill", `url(#vgrad-${p.color})`)
					.attr("stroke", col).attr("stroke-width", 1.7).attr("stroke-linejoin", "round");
				// mean tick
				g.append("line").attr("x1", x(p.mean)).attr("x2", x(p.mean))
					.attr("y1", baselineY(rank)).attr("y2", baselineY(rank) - rowStep * 1.15)
					.attr("stroke", "#3f3a34").attr("stroke-width", 1.4);
				// label (name / dates · n)
				const mt = p.label.match(/^(.*?)\s+(\d{4}-\d{4})$/);
				const name = mt ? mt[1] : p.label;
				const dates = mt ? mt[2].replace("-", "–") : "";
				const lab = g.append("g");
				lab.append("text").attr("x", m.l - 16).attr("y", baselineY(rank) - 4).attr("text-anchor", "end")
					.attr("fill", "#3f3a34").attr("font-size", 15).attr("font-weight", 600)
					.attr("font-family", '"Source Sans 3", system-ui, sans-serif').text(name);
				lab.append("text").attr("x", m.l - 16).attr("y", baselineY(rank) + 12).attr("text-anchor", "end")
					.attr("fill", col).attr("font-size", 12).text(`${dates} · n=${p.n}`);
				return { g, path, rank, p };
			});

			function showRidge(r) {
				r.g.interrupt().transition().duration(450).attr("opacity", 1);
				r.path.interrupt().transition().duration(900).ease(d3.easeCubicOut)
					.attrTween("d", () => (t) => area(r.rank, t));
			}
			function hideRidge(r) {
				r.g.interrupt().attr("opacity", 0);
				r.path.interrupt().attr("d", area(r.rank, 0));
			}
			function showGroup(color, baseDelay) {
				ridgeG.filter((r) => r.p.color === color).forEach((r, k) =>
					setTimeout(() => showRidge(r), baseDelay + k * 130)
				);
			}
			function hideGroup(color) {
				ridgeG.filter((r) => r.p.color === color).forEach(hideRidge);
			}

			ridgeG.forEach(hideRidge);

			window.cohortStep = (i) => (i === 0 ? showGroup("declining", 0) : showGroup("rising", 0));
			window.cohortReset = () => ridgeG.forEach(hideRidge);
			window.cohortShowAll = () => ridgeG.forEach((r) => { r.g.interrupt().attr("opacity", 1); r.path.interrupt().attr("d", area(r.rank, 1)); });

			var _transitions = [
				{ index: 0, transitionForward: () => showGroup("declining", 0), transitionBackward: () => hideGroup("declining") },
				{ index: 1, transitionForward: () => showGroup("rising", 0), transitionBackward: () => hideGroup("rising") },
			];
		</script>
	</body>
</html>
