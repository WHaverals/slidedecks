<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=JetBrains+Mono:wght@400&display=swap"
		/>
		<script src="../../../plugins/d3/d3.min.js"></script>
		<style>
			html,
			body {
				margin: 0;
				background: transparent;
				overflow: hidden;
			}
			svg {
				display: block;
			}
			text {
				font-family: "JetBrains Mono", ui-monospace, monospace;
			}
		</style>
	</head>
	<body>
		<script src="quotation-rate-data.js"></script>
		<script>
			const ACCENT = "#4662ac"; // PPA archive blue
			const MARK = "#f05c6a"; // PPA logo coral — the legal landmark
			const data = window.PPA_QUOTATION_RATE;
			const pts = data.points;
			const curve = data.curve;

			const W = 1000,
				H = 440;
			const m = { l: 76, r: 24, t: 22, b: 64 };
			const x = d3.scaleLinear().domain([1694, 1920]).range([m.l, W - m.r]);
			const y = d3.scaleLinear().domain([0, 40]).range([H - m.b, m.t]);
			const plotW = W - m.r - m.l;

			const svg = d3
				.select("body")
				.append("svg")
				.attr("viewBox", `0 0 ${W} ${H}`)
				.attr("preserveAspectRatio", "xMidYMid meet")
				.attr("role", "img")
				.attr("aria-label", "Distinct poems quoted per 100 host-work pages, 1694 to 1920");

			// size the svg to the iframe element's real pixels (reveald3 gives a 100vh viewport)
			function fitToFrame() {
				const el = window.frameElement;
				svg.attr("width", el ? el.clientWidth : W).attr("height", el ? el.clientHeight : H);
			}
			fitToFrame();
			window.addEventListener("resize", fitToFrame);

			// --- gridlines + axes (static) ---
			const grid = svg.append("g");
			y.ticks(4).forEach((t) => {
				grid
					.append("line")
					.attr("x1", m.l)
					.attr("x2", W - m.r)
					.attr("y1", y(t))
					.attr("y2", y(t))
					.attr("stroke", "#e3ddd3")
					.attr("stroke-width", 1);
				grid
					.append("text")
					.attr("x", m.l - 13)
					.attr("y", y(t))
					.attr("text-anchor", "end")
					.attr("dominant-baseline", "middle")
					.attr("fill", "#78716c")
					.attr("font-size", 16)
					.text(t);
			});
			[1700, 1740, 1780, 1820, 1860, 1900].forEach((t) => {
				grid
					.append("text")
					.attr("x", x(t))
					.attr("y", H - 38)
					.attr("text-anchor", "middle")
					.attr("fill", "#78716c")
					.attr("font-size", 16)
					.text(t);
			});
			// axis titles (a touch darker, more breathing room below the year ticks)
			svg
				.append("text")
				.attr("x", m.l + plotW / 2)
				.attr("y", H - 8)
				.attr("text-anchor", "middle")
				.attr("fill", "#57534e")
				.attr("font-size", 16)
				.text("PPA host publication year");
			svg
				.append("text")
				.attr("transform", `translate(20, ${m.t + (H - m.b - m.t) / 2}) rotate(-90)`)
				.attr("text-anchor", "middle")
				.attr("fill", "#57534e")
				.attr("font-size", 15)
				.text("Distinct poems per 100 pages");

			// --- band + line, wiped in left→right via a growing clip ---
			const clip = svg
				.append("clipPath")
				.attr("id", "rateclip")
				.append("rect")
				.attr("x", m.l)
				.attr("y", 0)
				.attr("width", 0)
				.attr("height", H);

			const area = d3
				.area()
				.x((d) => x(d.year))
				.y0((d) => y(d.lo))
				.y1((d) => y(d.hi))
				.curve(d3.curveMonotoneX);
			const line = d3
				.line()
				.x((d) => x(d.year))
				.y((d) => y(d.rate))
				.curve(d3.curveMonotoneX);

			svg
				.append("path")
				.attr("d", area(curve))
				.attr("fill", "rgba(70, 98, 172, 0.13)")
				.attr("clip-path", "url(#rateclip)");
			svg
				.append("path")
				.attr("d", line(curve))
				.attr("fill", "none")
				.attr("stroke", ACCENT)
				.attr("stroke-width", 3)
				.attr("stroke-linejoin", "round")
				.attr("clip-path", "url(#rateclip)");

			// --- annual points (pop in as the line passes them) ---
			const dots = svg
				.append("g")
				.selectAll("circle")
				.data(pts)
				.join("circle")
				.attr("cx", (d) => x(d.year))
				.attr("cy", (d) => y(Math.min(d.rate, 40)))
				.attr("r", 3)
				.attr("fill", "none")
				.attr("stroke", "rgba(70, 98, 172, 0.55)")
				.attr("stroke-width", 1.3)
				.attr("opacity", 0);

			const DRAW_MS = 1800;
			const delayFor = (yr) => ((x(yr) - m.l) / plotW) * DRAW_MS;

			function playDraw() {
				clip.interrupt().attr("width", 0).transition().duration(DRAW_MS).ease(d3.easeLinear).attr("width", plotW);
				dots
					.interrupt()
					.attr("opacity", 0)
					.transition()
					.delay((d) => delayFor(d.year))
					.duration(200)
					.attr("opacity", 1);
			}
			function resetDraw() {
				clip.interrupt().attr("width", 0);
				dots.interrupt().attr("opacity", 0);
			}

			// --- Donaldson v. Becket (1774): a dotted vermilion landmark, revealed on click ---
			const MX = x(1774);
			const marker = svg.append("g");
			const mline = marker
				.append("line")
				.attr("x1", MX)
				.attr("x2", MX)
				.attr("y1", y(0))
				.attr("y2", y(0))
				.attr("stroke", MARK)
				.attr("stroke-width", 1.8)
				.attr("stroke-dasharray", "2 6")
				.attr("stroke-linecap", "round");
			const MLY = 35; // label / dot height — between the 30 and 40 gridlines, on the line
			const mdot = marker.append("circle").attr("cx", MX).attr("cy", y(MLY)).attr("r", 0).attr("fill", MARK);
			const mlabel = marker
				.append("text")
				.attr("x", MX + 11)
				.attr("y", y(MLY))
				.attr("dominant-baseline", "middle")
				.attr("fill", MARK)
				.attr("font-size", 15.5)
				.attr("font-family", '"Source Sans 3", system-ui, sans-serif')
				.attr("font-weight", 600)
				.attr("opacity", 0)
				.text("Donaldson v. Becket (1774)");

			function showMarker() {
				// guarantee the curve is fully drawn first (in case of an early click)
				clip.interrupt().attr("width", plotW);
				dots.interrupt().attr("opacity", 1);
				mline.interrupt().attr("y2", y(0)).transition().duration(650).ease(d3.easeCubicOut).attr("y2", y(40));
				mdot.interrupt().attr("r", 0).transition().delay(430).duration(260).attr("r", 3.6);
				mlabel.interrupt().attr("opacity", 0).transition().delay(520).duration(460).attr("opacity", 1);
			}
			function hideMarker() {
				mline.interrupt().attr("y2", y(0));
				mdot.interrupt().attr("r", 0);
				mlabel.interrupt().attr("opacity", 0);
			}

			resetDraw();
			hideMarker();

			// the deck calls playRate() when the slide becomes active → the curve draws
			// itself in on arrival; the marker is a reveald3 click step after that.
			window.playRate = playDraw;
			window.resetRate = resetDraw;

			var _transitions = [
				{
					transitionForward: () => showMarker(),
					transitionBackward: () => hideMarker(),
					index: 0,
				},
			];
		</script>
	</body>
</html>
