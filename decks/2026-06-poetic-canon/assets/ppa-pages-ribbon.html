<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script src="../../../plugins/d3/d3.min.js"></script>
		<style>
			html,
			body {
				margin: 0;
				background: transparent;
				overflow: hidden;
			}
			svg {
				display: block;
			}
		</style>
	</head>
	<body>
		<script src="ppa-pages-ribbon-data.js"></script>
		<script>
			const COLORS = {
				bar: 'rgba(70, 98, 172, 0.26)',
				barHighlight: 'rgba(70, 98, 172, 0.62)',
				rule: '#78716c',
				label: '#57534e',
				axis: '#78716c',
			};

			const width = 920;
			const height = 170;
			const padL = 4;
			const padR = 8;
			const padTop = 12;
			const padBottom = 28;

			const svg = d3
				.select('body')
				.append('svg')
				.attr('viewBox', `0 0 ${width} ${height}`)
				.attr('preserveAspectRatio', 'xMidYMid meet')
				.attr('role', 'img')
				.attr('aria-label', 'Host-work pages per publication year in the PPA');

			// reveald3 gives the iframe a 100vw/100vh internal viewport, so % and
			// vh sizing balloon the SVG. Size it to the iframe ELEMENT's real pixels
			// instead (works because the iframe is same-origin), and keep it in sync.
			function fitToFrame() {
				const el = window.frameElement;
				const w = el ? el.clientWidth : width;
				const h = el ? el.clientHeight : height;
				svg.attr('width', w).attr('height', h);
			}
			fitToFrame();
			window.addEventListener('resize', fitToFrame);

			const plotBottom = height - padBottom;
			const payload = window.PPA_PAGES_RIBBON;
			const meta = payload.meta;
			const data = payload.years;
			const refY = meta.reference_pages_per_year;
			const highlightFrom = 1700;
			const highlightTo = 1920;
			const isHighlit = (yr) => yr >= highlightFrom && yr <= highlightTo;

			const x = d3
				.scaleLinear()
				.domain([meta.year_lo, meta.year_hi])
				.range([padL, width - padR]);

			const yMax = Math.max(d3.max(data, (d) => d.pages), refY);
			const y = d3
				.scaleLinear()
				.domain([0, yMax * 1.05])
				.range([plotBottom, padTop]);

			const spanYears = meta.year_hi - meta.year_lo + 1;
			const barW = Math.max(1.4, (width - padL - padR) / spanYears);

			const bars = svg
				.selectAll('rect.bar')
				.data(data)
				.join('rect')
				.attr('class', 'bar')
				.attr('x', (d) => x(d.year) - barW / 2)
				.attr('width', barW)
				.attr('y', (d) => y(d.pages))
				.attr('height', (d) => plotBottom - y(d.pages))
				.attr('fill', COLORS.bar);

			const refRule = svg
				.append('line')
				.attr('class', 'ref-rule')
				.attr('x1', padL)
				.attr('x2', width - padR)
				.attr('y1', y(refY))
				.attr('y2', y(refY))
				.attr('stroke', COLORS.rule)
				.attr('stroke-width', 1)
				.attr('stroke-dasharray', '4 4')
				.attr('opacity', 0.9);

			const refLabel = svg
				.append('text')
				.attr('class', 'ref-label')
				.attr('x', padL + 4)
				.attr('y', y(refY) - 4)
				.attr('fill', COLORS.label)
				.attr('font-family', "'JetBrains Mono', ui-monospace, monospace")
				.attr('font-size', 19)
				.attr('opacity', 1)
				.text(`${refY.toLocaleString('en-US')} pages`);

			const axisLabels = svg.append('g').attr('class', 'axis-labels').attr('opacity', 1);

			const tickYears = [1532, 1600, 1700, 1800, 1900];
			tickYears.forEach((yr) => {
				axisLabels
					.append('text')
					.attr('x', x(yr))
					.attr('y', height - 4)
					.attr('text-anchor', yr === meta.year_lo ? 'start' : 'middle')
					.attr('fill', COLORS.axis)
					.attr('font-family', "'JetBrains Mono', ui-monospace, monospace")
					.attr('font-size', 19)
					.text(String(yr));
			});

			// The full chart (axes, bars, reference line) is drawn on arrival. The only
			// click step highlights the nineteenth-century surge.
			var _transitions = [
				{
					transitionForward: () =>
						bars
							.transition()
							.duration(650)
							.attr('fill', (d) =>
								isHighlit(d.year) ? COLORS.barHighlight : COLORS.bar
							),
					transitionBackward: () =>
						bars.transition().duration(350).attr('fill', COLORS.bar),
					index: 0,
				},
			];
		</script>
	</body>
</html>
