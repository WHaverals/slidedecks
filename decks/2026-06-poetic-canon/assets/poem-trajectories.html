<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=Source+Sans+3:wght@400;600&family=JetBrains+Mono:wght@400&display=swap"
		/>
		<script src="../../../plugins/d3/d3.min.js"></script>
		<style>
			html,
			body {
				margin: 0;
				background: transparent;
				overflow: hidden;
			}
			svg {
				display: block;
			}
			text {
				font-family: "JetBrains Mono", ui-monospace, monospace;
			}
		</style>
	</head>
	<body>
		<script src="poem-trajectories-data.js"></script>
		<script>
			// PPA logo tricolor, mapped to archetype
			const COL = { riser: "#2f9e9b", anchor: "#4662ac", decliner: "#f05c6a" };
			const ARCH_WORD = { riser: "rising", anchor: "steady", decliner: "falling" };
			const data = window.PPA_TRAJECTORIES;
			const heroes = data.poems.filter((p) => p.hero);

			const W = 1000, H = 470;
			const m = { l: 60, r: 280, t: 22, b: 46 };
			const x = d3.scaleLinear().domain(data.x_domain).range([m.l, W - m.r]);
			const y = d3.scaleLinear().domain(data.y_domain).range([H - m.b, m.t]);

			const svg = d3
				.select("body")
				.append("svg")
				.attr("viewBox", `0 0 ${W} ${H}`)
				.attr("preserveAspectRatio", "xMidYMid meet");

			function fitToFrame() {
				const el = window.frameElement;
				svg.attr("width", el ? el.clientWidth : W).attr("height", el ? el.clientHeight : H);
			}
			fitToFrame();
			window.addEventListener("resize", fitToFrame);

			const line = d3
				.line()
				.x((d) => x(d.decade))
				.y((d) => y(d.fit))
				.curve(d3.curveMonotoneX);

			// --- gridlines + axes ---
			const grid = svg.append("g");
			[-2, -1, 1, 2].forEach((t) => {
				grid.append("line").attr("x1", m.l).attr("x2", W - m.r).attr("y1", y(t)).attr("y2", y(t))
					.attr("stroke", "#ece7df").attr("stroke-width", 1);
			});
			// emphasised zero rule = "holding steady"
			grid.append("line").attr("x1", m.l).attr("x2", W - m.r).attr("y1", y(0)).attr("y2", y(0))
				.attr("stroke", "#bdb6a9").attr("stroke-width", 1.2).attr("stroke-dasharray", "5 5");
			[1700, 1750, 1800, 1850, 1900].forEach((t) => {
				grid.append("text").attr("x", x(t)).attr("y", H - 18).attr("text-anchor", "middle")
					.attr("fill", "#78716c").attr("font-size", 15).text(t);
			});
			svg.append("text").attr("x", (m.l + W - m.r) / 2).attr("y", H - 2).attr("text-anchor", "middle")
				.attr("fill", "#57534e").attr("font-size", 15).text("Decade");

			// y-axis framing — what up/down means, no log-odds jargon
			const yLab = (txt, yv, anchor) =>
				svg.append("text").attr("transform", `translate(20, ${y(yv)}) rotate(-90)`)
					.attr("text-anchor", anchor).attr("fill", "#a8a29e").attr("font-size", 13.5)
					.attr("letter-spacing", "0.04em").text(txt);
			yLab("GAINING GROUND ↑", 1.95, "end");
			yLab("↓ LOSING GROUND", -1.95, "start");

			// short display names for the end-labels
			const SHORT = {
				"Geoffrey-Chaucer_The-Canterbury-Tales": "The Canterbury Tales",
				"John-Milton_LAllegro": "L’Allegro",
				"Virgil_Aeneid": "The Aeneid",
			};

			// --- hero trajectories (drawn one at a time) ---
			const heroG = heroes.map((p) => {
				const g = svg.append("g");
				const dots = g.append("g");
				p.points.forEach((d) =>
					dots.append("circle").attr("cx", x(d.decade)).attr("cy", y(d.raw)).attr("r", 2.6)
						.attr("fill", "none").attr("stroke", COL[p.archetype]).attr("stroke-width", 1.2).attr("opacity", 0)
				);
				const path = g.append("path").attr("d", line(p.points)).attr("fill", "none")
					.attr("stroke", COL[p.archetype]).attr("stroke-width", 3.4).attr("stroke-linejoin", "round")
					.attr("stroke-linecap", "round");
				const last = p.points[p.points.length - 1];
				const lab = g.append("g").attr("transform", `translate(${x(last.decade) + 10}, ${y(last.fit)})`).attr("opacity", 0);
				lab.append("text").attr("y", -2).attr("fill", COL[p.archetype]).attr("font-size", 15.5)
					.attr("font-weight", 600).attr("font-family", '"Source Sans 3", system-ui, sans-serif')
					.text(SHORT[p.id] || p.label);
				lab.append("text").attr("y", 15).attr("fill", COL[p.archetype]).attr("font-size", 12)
					.attr("letter-spacing", "0.03em").attr("opacity", 0.85)
					.text(`${p.author.includes("(") ? p.author : p.author.split(" / ")[0].split(" ").slice(-1)[0]} · ${ARCH_WORD[p.archetype]}`);
				return { path, dots, lab, p };
			});

			function drawHero(i) {
				const h = heroG[i];
				const len = h.path.node().getTotalLength();
				const DUR = 1100;
				h.path.interrupt().attr("stroke-dasharray", `${len} ${len}`).attr("stroke-dashoffset", len)
					.transition().duration(DUR).ease(d3.easeCubicInOut).attr("stroke-dashoffset", 0);
				const x0 = x(h.p.points[0].decade), x1 = x(h.p.points[h.p.points.length - 1].decade);
				h.dots.selectAll("circle").interrupt().attr("opacity", 0).transition()
					.delay((d, k, nodes) => { const cx = +nodes[k].getAttribute("cx"); return ((cx - x0) / (x1 - x0)) * DUR; })
					.duration(200).attr("opacity", 0.42);
				h.lab.interrupt().attr("opacity", 0).transition().delay(DUR * 0.6).duration(400).attr("opacity", 1);
			}
			function hideHero(i) {
				const h = heroG[i];
				const len = h.path.node().getTotalLength();
				h.path.interrupt().attr("stroke-dasharray", `${len} ${len}`).attr("stroke-dashoffset", len);
				h.dots.selectAll("circle").interrupt().attr("opacity", 0);
				h.lab.interrupt().attr("opacity", 0);
			}
			heroes.forEach((p, i) => hideHero(i));

			window.trajStep = (i) => drawHero(i);
			window.trajReset = () => heroes.forEach((p, i) => hideHero(i));

			var _transitions = heroes.map((p, i) => ({
				index: i,
				transitionForward: () => drawHero(i),
				transitionBackward: () => hideHero(i),
			}));
		</script>
	</body>
</html>
