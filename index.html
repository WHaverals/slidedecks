<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slidedecks</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Sans+3:wght@400;600&display=swap" />
  <style>
    :root {
      color-scheme: light;
      --bg: #faf8f5;
      --text: #1c1917;
      --muted: #57534e;
      --accent: #b5341c;
      --card: #f3efe8;
      --border: #e7e0d8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.25rem;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 2rem;
      color: var(--muted);
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.75rem;
    }

    li.empty {
      padding: 1rem 1.25rem;
      border: 1px dashed var(--border);
      border-radius: 0.75rem;
      color: var(--muted);
    }

    a {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 1rem 1.25rem;
      border-radius: 0.75rem;
      background: var(--card);
      color: inherit;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    a:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    a strong {
      color: var(--accent);
      font-weight: 600;
    }

    a span {
      color: var(--muted);
      font-size: 0.9rem;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
    }

    code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.85em;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Slidedecks</h1>
    <p>Conference talks built with reveal.js and the Wouter theme.</p>
    <ul>
      <li><a href="decks/2026-09-my-conf-talk/"><strong>Your Talk Title</strong><span>2026-09-my-conf-talk</span></a></li>
      <li><a href="decks/2026-06-poetic-canon/"><strong>Evolution of the Poetic Canon in the Princeton Prosody Archive</strong><span>2026-06-poetic-canon</span></a></li>
      <li><a href="decks/2026-06-plugin-showcase/"><strong>Plugin Showcase</strong><span>2026-06-plugin-showcase</span></a></li>
      <li><a href="decks/2026-06-example-conf-talk/"><strong>Example Conference Talk</strong><span>2026-06-example-conf-talk</span></a></li>
    </ul>
  </main>
</body>
</html>
